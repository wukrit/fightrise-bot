name: Dependency Review

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on high severity vulnerabilities
          fail-on-severity: high
          # Allow known vulnerabilities in development dependencies
          allow-dependencies-licenses: false
          # Show a summary of the review
          summary: true
