name: Deploy Docs

on:
  push:
    branches: [main]
    paths: ['apps/docs/**', '.github/workflows/docs.yml', '.gitignore']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
      - run: npm install
        working-directory: apps/docs
      - run: npm run build
        working-directory: apps/docs

      - name: Deploy built docs to /docs
        run: |
          # Remove old docs/ from git index (ignore if not tracked) and filesystem
          git rm -rf --cached docs/ 2>/dev/null || true
          rm -rf docs/

          # Copy built output to /docs (GitHub Pages serves from /docs subdirectory)
          mkdir -p docs
          cp -r apps/docs/out/. docs/

          # Create root index.html from getting-started (empty slug → / route)
          cp docs/getting-started/index/index.html docs/index.html

          # Create .nojekyll to prevent Jekyll processing
          touch docs/.nojekyll

          # Stage all new static files in /docs (docs/ is in .gitignore so -f is needed)
          git add -f docs/ 2>/dev/null || true

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "docs: update static documentation" || echo "No changes to commit"
          git push
