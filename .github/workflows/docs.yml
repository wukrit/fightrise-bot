name: Deploy Docs

on:
  push:
    branches: [main]
    paths: ['apps/docs/**', '.github/workflows/docs.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
      - run: npm install
        working-directory: apps/docs
      - run: npm run build
        working-directory: apps/docs

      - name: Copy built docs to docs folder
        run: |
          rm -rf docs/*
          cp -r apps/docs/out/* docs/

          # Create root index.html by copying the getting-started content
          cp docs/getting-started/index/index.html docs/index.html

          # Create .nojekyll to prevent Jekyll processing
          touch docs/.nojekyll

          git add docs/

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "docs: update static documentation" || echo "No changes to commit"
          git push
