name: Deploy Docs

on:
  push:
    branches: [main]
    paths: ['apps/docs/**', '.github/workflows/docs.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
      - run: npm install
        working-directory: apps/docs
      - run: npm run build
        working-directory: apps/docs

      - name: Copy built docs to repo root
        run: |
          # Remove old docs/ folder (no longer used)
          rm -rf docs/

          # Copy built output to repo root (GitHub Pages serves from root)
          cp -r apps/docs/out/* .

          # Create root index.html from getting-started (empty slug → / route)
          cp getting-started/index/index.html index.html

          # Create .nojekyll to prevent Jekyll processing
          touch .nojekyll

          # Stage everything except node_modules, apps, packages, .git, etc.
          git add -f *.html 404/ _next/ getting-started/ guides/ reference/ .nojekyll favicon.svg 2>/dev/null || true

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "docs: update static documentation" || echo "No changes to commit"
          git push
